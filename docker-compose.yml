services:
  db:
    image: postgres:18
    container_name: my_first_cursor_db
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    ports:
      # Use 5433 on the host so local `npm run dev` does not hit another Postgres already bound to 5432
      - "5433:5432"
    volumes:
      # Postgres 18+ expects the volume on /var/lib/postgresql (not .../data only)
      - postgres_data:/var/lib/postgresql

  web:
    build: .
    container_name: my_first_cursor_web
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/appdb?schema=public
      NODE_ENV: production
      # Public URL users open in the browser (must match app URL for auth cookies)
      NEXTAUTH_URL: http://localhost:3001
    ports:
      # Host 3001 avoids conflict when something else uses 3000 (e.g. local `npm run dev`)
      - "3001:3000"
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
